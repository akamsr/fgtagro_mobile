name: fgtagro_mobile
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  auto_route: ^11.1.0
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  http: ^1.6.0
  dio: ^5.9.2
  http_parser: ^4.1.2
  mime: ^2.0.0
  google_maps_flutter: ^2.17.0
  flutter_polyline_points: ^3.1.0
  flutter_map: ^8.3.0
  flutter_map_cancellable_tile_provider: ^3.1.1
  flutter_map_animations: ^0.10.0
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  location: ^8.0.1
  flutter_rating_bar: ^4.0.1
  shared_preferences: ^2.5.5
  # localstorage: ^6.0.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^21.0.0
  image_picker: ^1.2.2
  file_picker: ^11.0.2
  pdf: ^3.12.0
  pdfx: ^2.9.2
  syncfusion_flutter_pdfviewer: ^33.2.5
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  firebase_crashlytics: ^5.2.0
  cloud_firestore: ^6.3.0
  flutter_screenutil: ^5.9.3
  device_info_plus: ^12.4.0
  logger: ^2.7.0
  connectivity_plus: ^7.1.1
  dartz: ^0.10.1
  geocoding: ^4.0.0
  flutter_branch_sdk: ^9.3.1
  fluttertoast: ^9.0.0
  jwt_decoder: ^2.0.1
  network_info_plus: ^7.0.0
  syncfusion_flutter_datepicker: ^33.2.5
  equatable: ^2.0.8
  flutter_svg: ^2.3.0
  flutter_keyboard_visibility: ^6.0.0
  permission_handler: ^12.0.1
  auto_route_generator: ^10.5.0
  envied: ^1.3.5
  uuid: ^4.5.3

dev_dependencies:
  build_runner: ^2.15.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  envied_generator: ^1.3.4
  flutter_launcher_icons: ^0.14.4
  intl_utils: ^2.8.14
  hive_ce_generator: ^1.11.1
  flutter_gen_runner: ^5.14.1
  flutter_gen: ^5.14.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/logo.jpg"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/images/
    - assets/svgs/
    - assets/onboarding/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
        - asset: assets/fonts/PlusJakartaSans-Light.ttf
        - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf

    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
        - asset: assets/fonts/Roboto-Medium.ttf
        - asset: assets/fonts/Roboto-Black.ttf

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
